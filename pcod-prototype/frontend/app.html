    const PARTNER_MODULES = [
      {
        id: "basics", title: "Understanding PCOD", emoji: "🧬", color: "#F5F3FF", border: "#C4B5FD", badge: "Start Here",
        content: [
          {q: "What is PCOD/PCOS?", a: "PCOD (Polycystic Ovarian Disease) = PCOS (Polycystic Ovary Syndrome). It's a hormonal disorder affecting 1 in 10 women. The ovaries produce excess andro gens (male hormones), causing irregular periods, acne, weight gain, and hair growth.", icon: "🧬"},
          {q: "How is it different from other period issues?", a: "Normal irregular periods = temporary. PCOD = chronic hormonal imbalance. Your partner's PCOD is NOT her fault. It's a medical condition like diabetes — not a lifestyle failure.", icon: "⚖️"},
          {q: "What causes it?", a: "Root cause = insulin resistance (she can't process sugar efficiently). This triggers her ovaries to overproduce androgens. Inflammation, genetics, and environment all play roles.", icon: "🔗"},
        ]
      },
      {
        id: "period", title: "The Menstrual Cycle Explained", emoji: "🩸", color: "#FDF0F5", border: "#F5BDCE", badge: "Core Knowledge",
        content: [
          {q: "What happens during her period?", a: "Day 1–5: Shedding of uterine lining. Blood flow is normal. She'll feel cramping, fatigue, and mood swings due to prostaglandins (chemicals that trigger uterine contractions).", icon: "🩸"},
          {q: "What's the fertile window?", a: "Days 10–17 (roughly). This is when pregnancy is possible. During this time she has more energy and confidence — ride that wave with her.", icon: "🌱"},
          {q: "What is PMS?", a: "Days 21–28 (luteal phase). Serotonin & dopamine drop. She experiences mood swings, cravings, bloating, fatigue. It's REAL — not 'drama.' Clinical name: PMDD if severe.", icon: "😔"},
        ]
      },
      {
        id: "support", title: "How to Support Her", emoji: "💙", color: "#EFF6FF", border: "#BFDBFE", badge: "Most Important",
        content: [
          {q: "What does she need from you?", a: "Listen without fixing. Cook when she's in pain. Validate: 'Your pain is real.' Don't say 'just be positive.' Show interest in her PCOD — ask about her symptoms, diet wins, and feelings.", icon: "💙"},
          {q: "How to help during her period?", a: "✅ Keep heating pads ready\n✅ Do physical tasks (cooking, dishes)\n✅ Offer pain meds if needed\n✅ Avoid planning heavy activities\n✅ Give space but be present\n✅ Say 'How can I help?'", icon: "🤕"},
          {q: "What NOT to do?", a: "❌ Don't ask 'Is it that time of the month?'\n❌ Never say she's 'being dramatic'\n❌ Don't minimize: 'Other women handle it'\n❌ Don't comment on her body/weight\n❌ Don't push unwanted advice\n❌ Don't touch if she's in pain without asking", icon: "⛔"},
          {q: "How often should you check in?", a: "Daily 'How are you?\' is enough. During period: daily + extra checking. Don't make it clinical — just show you care. Let her lead the conversation about her PCOD.", icon: "📞"},
          {q: "Can you help with diet?", a: "YES. Stock PCOD-friendly foods: leafy greens, nuts, salmon, berries, lentils. AVOID: white bread, sugary drinks, processed snacks. Suggest meals, don't force. Eat together.", icon: "🥗"},
        ]
      },
      {
        id: "diet", title: "Diet & Lifestyle Help", emoji: "🥗", color: "#ECFDF5", border: "#A7F3D0", badge: "Practical",
        content: [
          {q: "What foods help with PCOD?", a: "Inositol-rich: Legumes, citrus\nOmega-3s: Salmon, walnuts, flax\nFiber: Vegetables, whole grains\nAnti-inflammatory: Turmeric, cinnamon\nProtein: Eggs, yogurt, lean meat\nMinerals: Leafy greens for magnesium", icon: "🌿"},
          {q: "What foods should she avoid?", a: "❌ White bread (spikes blood sugar)\n❌ Sugary soda & juice\n❌ Fast food & fried stuff\n❌ Refined sugar & desserts\n❌ Alcohol (worsens hormones)\n❌ Excess dairy (some women worse)\n❌ Processed snacks", icon: "🚫"},
          {q: "How do you encourage healthy eating?", a: "1. Suggest, don't preach\n2. Eat WITH her (lead by example)\n3. Cook TOGETHER (fun bonding)\n4. Stock healthy snacks\n5. Plan meals together\n6. Never comment on what she eats\n7. Celebrate her wins silently", icon: "👨‍🍳"},
        ]
      },
      {
        id: "mental", title: "Mental Health & PCOD", emoji: "🧠", color: "#F5F3FF", border: "#C4B5FD", badge: "Vital",
        content: [
          {q: "PCOD and mental health are linked", a: "50–70% of women with PCOD experience anxiety or depression. It's caused by hormonal imbalance (not weakness). She literally has a different brain chemistry during certain phases.", icon: "🔗"},
          {q: "Signs she may be struggling:", a: "Crying more than usual, withdrawing from social activities, feeling hopeless about her health, extreme irritability, sleep problems, loss of interest in things she loves. Take these seriously.", icon: "🚨"},
          {q: "What NOT to do:", a: "❌ Don't say 'just be positive'\n❌ Don't suggest she's 'overthinking'\n❌ Don't minimize: 'other people have it worse'\n❌ Don't push therapy aggressively\n❌ Don't get frustrated with her emotions", icon: "🚫"},
          {q: "What TO do:", a: "✅ Listen without fixing\n✅ Sit with her in silence if needed\n✅ Say 'Your feelings are valid'\n✅ Gently suggest professional support\n✅ Research therapists together\n✅ Remind her she isn't broken", icon: "💙"},
          {q: "Your own mental health matters too", a: "Being a support partner can be emotionally draining. Join communities of partners of PCOD/PCOS women. Talk to friends or a therapist yourself. You can't pour from an empty cup.", icon: "🫀"},
        ]
      },
    ];

    // ═════ HELPER FUNCTIONS ═════
    const ini = (n = "U") => n.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    const getDays = (y, m) => new Date(y, m + 1, 0).getDate();
    const getFirst = (y, m) => new Date(y, m, 1).getDay();

    // ═════ TOAST ═════
    function Toast({ msg, icon, close }) {
      useEffect(() => { const t = setTimeout(close, 3000); return () => clearTimeout(t); }, []);
      return <div className="toast"><span>{icon || "✅"}</span><span>{msg}</span></div>;
    }

    // ═════ CALENDAR ═════
    function CycleCalendar({ pdays, onDay }) {
      const today = new Date();
      const [y, setY] = useState(today.getFullYear());
      const [m, setM] = useState(today.getMonth());
      const days = getDays(y, m);
      const first = getFirst(y, m);
      const prev = () => m === 0 ? (setM(11), setY(y - 1)) : setM(m - 1);
      const next = () => m === 11 ? (setM(0), setY(y + 1)) : setM(m + 1);
      const dtype = day => {
        const d = new Date(y, m, day);
        if (pdays.some(p => p.toDateString() === d.toDateString())) return "period";
        if (d.toDateString() === today.toDateString()) return "today";
        if (day >= 11 && day <= 17 && m === today.getMonth()) return "fertile";
        if (day === 14 && m === today.getMonth()) return "ov";
        if (day >= 28 && day <= 31 && m === today.getMonth()) return "pred";
        return "";
      };
      return (
        <div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <button className="btn btn-ghost" style={{ padding: "5px 10px" }} onClick={prev}>‹</button>
            <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18 }}>{FULL_MONTHS[m]} {y}</h3>
            <button className="btn btn-ghost" style={{ padding: "5px 10px" }} onClick={next}>›</button>
          </div>
          <div className="cal-grid">
            {["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"].map(d => <div key={d} className="cal-hd">{d}</div>)}
            {Array(first).fill(null).map((_, i) => <div key={`e${i}`} />)}
            {Array(days).fill(null).map((_, i) => {
              const d = i + 1;
              const t = dtype(d);
              return <div key={d} className={`cal-d ${t}`} onClick={() => onDay && onDay(new Date(y, m, d), t)}>{d}</div>;
            })}
          </div>
          <div className="cal-legend">
            <div className="cl-item"><div className="cl-dot" style={{ background: "#C84B7A" }} /> Period</div>
            <div className="cl-item"><div className="cl-dot" style={{ background: "#16A34A" }} /> Fertile</div>
            <div className="cl-item"><div className="cl-dot" style={{ background: "#D97706" }} /> Ovulation</div>
          </div>
        </div>
      );
    }

    // ═════ WOMAN PORTAL ═════
    function WomanDashboard({ user, water, setWater, toast }) {
      const bmi = ((+user.weight) / ((+user.height / 100) ** 2)).toFixed(1);
      return <div className="fade">
        <div className="g4">
          {[{ l: "Cycle Day", v: "Day 18", n: "10 days to next period", c: "s-rose", i: "🩸", g: "linear-gradient(135deg, #C84B7A, #E15597)" },
          { l: "Weight", v: `${user.weight}kg`, n: "↓ 0.5kg this week", c: "s-pink", i: "⚖️", g: "linear-gradient(135deg, #F5BDCE, #E8A4C0)" },
          { l: "BMI", v: bmi, n: "Healthy range", c: "s-green", i: "📊", g: "linear-gradient(135deg, #059669, #10B981)" },
          { l: "Water Today", v: `${water * 250}ml`, n: `${water}/8 glasses`, c: "s-blue", i: "💧", g: "linear-gradient(135deg, #2563EB, #3B82F6)" },
          ].map((s, i) => <div key={i} className={`stat ${s.c} fade stagger-${i + 1}`} style={{ background: `${s.g}15`, borderImage: `linear-gradient(135deg, ${s.g.split(", ")[0]}, ${s.g.split(", ")[1]}) 1`, borderImageSlice: 1 }}>
            <div className="stat-icon" style={{ fontSize: "32px" }}>{s.i}</div><div className="stat-val" style={{ background: s.g, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>{s.v}</div>
            <div className="stat-lbl">{s.l}</div><div className="stat-note" style={{ color: "#64748B" }}>{s.n}</div>
          </div>)}
        </div>
        <div className="g2">
          <div className="card" style={{ background: "linear-gradient(135deg, #FDF0F5, #fff)", borderLeft: "4px solid #C84B7A" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div><div className="card-title">Water Intake 💧</div><div className="card-sub">Daily goal: 8 glasses</div></div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", margin: "16px 0" }}>
              {Array(8).fill(null).map((_, i) => <div key={i} className={`wdrop ${i < water ? "full" : ""}`} onClick={() => setWater(i < water ? i : i + 1)} style={{ cursor: "pointer", fontSize: "18px" }}>💧</div>)}
            </div>
            <div style={{ fontSize: 12, color: "#64748B", fontWeight: "500" }}>{water >= 8 ? "🎉 Daily goal achieved!" : ` ${water}/8 — keep going!`}</div>
          </div>
          <div className="card" style={{ background: "linear-gradient(135deg, #F0FDF4, #fff)", borderLeft: "4px solid #059669" }}>
            <div className="card-title">Quick Tips</div>
            <p style={{ fontSize: 12, color: "#475569", lineHeight: 1.8, marginTop: 8 }}>
              ✨ Today you're in your <span style={{ fontWeight: "700", color: "#059669" }}>luteal phase</span>. Focus on iron-rich foods and gentle exercise. Your mood may be lower — that's normal and temporary.
            </p>
          </div>
        </div>
      </div>;
    }

    function AuthScreen({ onLogin }) {
      const [step, setStep] = useState("portal");
      const [portal, setPortal] = useState(null);
      const [mode, setMode] = useState("login");
      const [form, setForm] = useState({ name: "", email: "", password: "", age: "28", height: "162", weight: "62", cycle: "28", school: "", subject: "", partnerName: "" });
      const [err, setErr] = useState("");
      const h = e => setForm({ ...form, [e.target.name]: e.target.value });

      const portals = [
        {
          id: "woman", icon: "🌸", title: "PCOD Warrior",
          desc: "Track your cycle, symptoms, diet & workouts. Get personalized insights for your PCOD journey.",

          desc: "Learn everything about PCOD to become the best support system for your partner. Practical guides & daily help.",

          id: "educator", icon: "📚", title: "Educator / Teacher",

        },
      ];

      const submit = () => {
        if (!form.email || !form.password) { setErr("Please fill all required fields."); return; }
        if (mode === "signup" && !form.name) { setErr("Please enter your name."); return; }
        setErr("");
        onLogin({
          portal, name: form.name || (portal === "educator" ? "Dr. Priya Singh" : "Rahul Sharma"),

      const btnC = portal === "partner" ? "btn-p" : portal === "educator" ? "btn-e" : "btn-w";

          {/* Animated background circles */}

          <div style={{ maxWidth: 900, width: "100%", position: "relative", zIndex: 2 }}>
            <div style={{ textAlign: "center", marginBottom: 48 }}>
              <div style={{ width: 80, height: 80, background: "linear-gradient(135deg, #C84B7A, #E15597, #7A1F4A)", borderRadius: 20, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40, margin: "0 auto 16px", boxShadow: "0 20px 60px rgba(200,75,122,0.5), 0 0 40px rgba(200,75,122,0.3)", animation: "bounce 3s ease-in-out infinite" }}>🌸</div>
              <h1 style={{ fontFamily: "'Cormorant Garamond', serif", color: "#fff", fontSize: 48, fontWeight: 800, marginBottom: 8, letterSpacing: "-1px" }}>PCOD Care Platform</h1>
              <p style={{ color: "rgba(255,255,255,0.7)", fontSize: 16, maxWidth: 520, margin: "0 auto", lineHeight: "1.6" }}>A comprehensive health system for women with PCOD — and everyone who wants to support them. Your journey, beautifully tracked.</p>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 24, marginBottom: 40 }}>
              {portals.map((p, idx) => (

                  className="portal-card fade" 
                  style={{

                    overflow: "hidden",
                    animation: `slideInUp 0.6s ease ${idx * 0.1}s backwards`

                  onMouseLeave={(e) => e.currentTarget.style.transform = portal === p.id ? "scale(1.05)" : "scale(1)"}
                >
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: `linear-gradient(135deg, ${p.border}00, ${p.border}15)`, opacity: portal === p.id ? 1 : 0, transition: "opacity 0.3s ease" }} />
                  <div style={{ position: "relative", zIndex: 1 }}>
                    <div className="portal-icon" style={{ fontSize: 56, marginBottom: 16 }}>{p.icon}</div>
                    <div className="portal-title" style={{ color: p.titleC, fontSize: "20px", fontWeight: 800, marginBottom: 8 }}>{p.title}</div>
                    <div className="portal-desc" style={{ color: "#64748B", fontSize: "13px", lineHeight: "1.6", marginBottom: 12 }}>{p.desc}</div>
                    {portal === p.id && (
                      <div style={{ marginTop: 12, animation: "slideInDown 0.4s ease" }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: p.titleC, background: `${p.titleC}20`, padding: "6px 12px", borderRadius: "20px", display: "inline-block" }}>✓ Selected</span>

                    )}
                  </div>
                </div>
              ))}

            <div style={{ textAlign: "center" }}>
              <button 
                className={`btn ${portal ? "btn-w" : "btn-ghost"} btn-full`}

                  margin: "0 auto",
                  fontSize: "15px",
                  fontWeight: "700",
                  padding: "14px 28px",
                  letterSpacing: "0.5px",
                  background: portal ? "linear-gradient(135deg, #C84B7A, #E15597)" : "transparent",
                  boxShadow: portal ? "0 12px 32px rgba(200,75,122,0.4)" : "none",

                  transition: "all 0.3s ease"
                }}
                disabled={!portal} 
                onClick={() => portal && setStep("form")}
                onMouseEnter={(e) => portal && (e.target.style.boxShadow = "0 16px 48px rgba(200,75,122,0.6)")}
                onMouseLeave={(e) => portal && (e.target.style.boxShadow = "0 12px 32px rgba(200,75,122,0.4)")}
              >
                Continue as {portal === "woman" ? "PCOD Warrior" : portal === "partner" ? "Supportive Partner" : portal === "educator" ? "Educator" : "..."}  →
              </button>
            </div>
          </div>

          <style>{`
            @keyframes pulse {
              0%, 100% { transform: scale(1); opacity: 0.5; }
              50% { transform: scale(1.1); opacity: 0.8; }
            }
            @keyframes bounce {
              0%, 100% { transform: translateY(0); }
              50% { transform: translateY(-15px); }
            }
            @keyframes slideInUp {
              from { opacity: 0; transform: translateY(30px); }
              to { opacity: 1; transform: translateY(0); }
            }
            @keyframes slideInDown {
              from { opacity: 0; transform: translateY(-15px); }
              to { opacity: 1; transform: translateY(0); }
            }
          `}</style>
        </div>
      );

          </div>
          <div className="sb-foot" style={{ position: "relative", zIndex: 1 }}>
            <div className="user-pill" style={{ background: "linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05))", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "12px", padding: "12px", marginBottom: "12px", backdropFilter: "blur(10px)" }}><div className="av" style={{ background: colors.avatar, width: "40px", height: "40px", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: "700", fontSize: "16px", boxShadow: "0 4px 12px rgba(0,0,0,0.3)", border: "2px solid rgba(255,255,255,0.2)" }}>{ini(user.name)}</div><div><div className="av-name" style={{ fontSize: "13px", fontWeight: "600", color: "#fff", marginLeft: "10px" }}>{user.name}</div><div className="av-role" style={{ fontSize: "11px", color: "rgba(255,255,255,0.6)", marginLeft: "10px", marginTop: "2px" }}>{colors.role}</div></div></div>
            <button className="nav-btn" style={{ marginTop: 6, color: "rgba(255,255,255,0.5)", width: "100%", padding: "10px", borderRadius: "8px", border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)", transition: "all 0.3s ease", cursor: "pointer" }} onMouseEnter={e => { e.target.style.background = "rgba(255,255,255,0.12)"; e.target.style.color = "rgba(255,255,255,0.8)"; }} onMouseLeave={e => { e.target.style.background = "rgba(255,255,255,0.05)"; e.target.style.color = "rgba(255,255,255,0.5)"; }} onClick={logout}><span className="ni">🚪</span>Sign Out</button>
          </div>
        </aside>
      );

      const renderContent = () => {
        if (portal === "woman") {
          return page === "dash" ? <WomanDashboard user={user} water={water} setWater={setWater} toast={toast} /> : <div className="card"><p>Page {page} coming soon...</p></div>;
        } else if (portal === "partner") {
          return page === "dash" ? <PartnerDash user={user} /> : page === "learn" ? <PartnerLearn user={user} /> : <div className="card"><p>Page {page} coming soon...</p></div>;
        } else {
          return page === "dash" ? <EduDash user={user} /> : <div className="card"><p>Page {page} coming soon...</p></div>;
        }
      };

      let sidebarConfig = {};
      if (portal === "woman") {
        sidebarConfig = {
          nav: [
            { id: "dash", i: "🏠", l: "Dashboard" }, { id: "period", i: "🩸", l: "Period Tracker" },
            { id: "symptoms", i: "📋", l: "Symptoms" }, { id: "diet", i: "🥗", l: "Diet" },
            { id: "exercise", i: "🏋️", l: "Exercise" }, { id: "analytics", i: "📊", l: "Analytics" },
          ],
          colors: {
            bg: "linear-gradient(160deg, #7A1F4A, #3D0A2A, #5D1A3A)",
            mark: "linear-gradient(135deg, #C84B7A, #E15597)",
            icon: "🌸",
            name: "PCOD Care",
            sub: "Women's Health",
            section: "Health Modules",
            avatar: "linear-gradient(135deg, #C84B7A, #7A1F4A)",
            role: "PCOD Warrior 🌸"
          }
        };
      } else if (portal === "partner") {
        sidebarConfig = {
          nav: [
            { id: "dash", i: "🏠", l: "Overview" }, { id: "learn", i: "📖", l: "Learning Hub" },
            { id: "daily", i: "📋", l: "Daily Support" }, { id: "calendar", i: "📅", l: "Cycle Calendar" },
          ],
          colors: {
            bg: "linear-gradient(160deg, #1E3A8A, #0F172A, #1a2f5c)",
            mark: "linear-gradient(135deg, #2563EB, #60A5FA)",
            icon: "💙",
            name: "Partner Hub",
            sub: "Support & Learn",
            section: "Partner Modules",
            avatar: "linear-gradient(135deg, #2563EB, #0EA5E9)",
            role: "Supportive Partner 💙"
          }
        };
      } else {
        sidebarConfig = {
          nav: [
            { id: "dash", i: "🏫", l: "Dashboard" }, { id: "lessons", i: "📖", l: "Lesson Plans" },
            { id: "classroom", i: "🎓", l: "Classroom Tools" }, { id: "resources", i: "📥", l: "Resources" },
          ],
          colors: {
            bg: "linear-gradient(160deg, #064E3B, #0F172A, #0d5a47)",
            mark: "linear-gradient(135deg, #059669, #10B981)",
            icon: "📚",
            name: "Edu Portal",
            sub: "Health Education",
            section: "Educator Tools",
            avatar: "linear-gradient(135deg, #059669, #10B981)",
            role: "Educator 📚"
          }
        };
      }

      return (
        <div className="layout">
          <Sidebar {...sidebarConfig} />
          <main className="main">
            <div className="topbar" style={{ 
              background: portal === "woman" ? "linear-gradient(135deg, #F5E8EB 0%, #FDF0F5 100%)" : portal === "partner" ? "linear-gradient(135deg, #EFF6FF 0%, #F0F9FF 100%)" : "linear-gradient(135deg, #F0FDF4 0%, #F0FFF4 100%)",
              borderBottom: portal === "woman" ? "2px solid #E5BCC7" : portal === "partner" ? "2px solid #BFDBFE" : "2px solid #A7F3D0",
              boxShadow: "0 2px 8px rgba(0,0,0,0.05)",
              backdropFilter: "blur(10px)"
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                <span style={{ fontSize: "20px" }}>{portal === "woman" ? "🌸" : portal === "partner" ? "💙" : "📚"}</span>
                <div>
                  <div style={{ fontSize: 17, fontWeight: 700, color: portal === "woman" ? "#7A1F4A" : portal === "partner" ? "#1E3A8A" : "#064E3B" }}>Dashboard</div>
                  <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 1 }}>{new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
                </div>
              </div>
            </div>
            <div className="page">
              {renderContent()}
            </div>
          </main>
          {toastData && <Toast msg={toastData.msg} icon={toastData.icon} close={() => setToastData(null)} />}
        </div>
      );
    }

    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
